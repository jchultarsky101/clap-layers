# cargo-deny configuration: the supply-chain policy for this workspace.
#
# Run `cargo deny check` locally; CI runs the same command on every push and
# weekly on a schedule.
#
# Every setting here is deliberate, and there are no `skip`, `exceptions` or
# `ignore` entries. Adding one should feel like a defeat: an exception means the
# policy has stopped describing what we actually do. The commented-out template
# from `cargo deny init` is omitted on purpose — it documents cargo-deny rather
# than this project, and it goes stale. Schema:
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Check every feature, not just the default set: a dependency that is sound by
# default and vulnerable behind a feature flag still reaches users who enable it.
all-features = true

[advisories]
# RustSec advisories. Vulnerabilities are errors. Unmaintained and yanked crates
# are warnings under version 2, which is where they belong — they are someone
# else's release cadence, not a defect we can fix by failing this build.
version = 2

[licenses]
version = 2
# Exactly what the dependency tree resolves to, verified rather than guessed.
# The tree is entirely permissive; Unicode-3.0 arrives from unicode-ident inside
# an AND expression, so it cannot be satisfied by picking another arm.
#
# Deliberately short. This crate is MIT, so a copyleft dependency would become a
# licensing problem for everyone downstream. Widening this list has consequences
# for users and should be a visible diff, not a default nobody chose.
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]

[bans]
# Two copies of a crate in a shipped build is bloat, and — where the crate
# carries types across an API boundary — a source of baffling errors. There are
# none today, so this is enforceable rather than aspirational.
multiple-versions = "deny"
# ...but not through dev-dependencies. `proptest` pulls two `getrandom` versions
# through its own tree: that never reaches a user, and we cannot fix it from
# here. Denying it would buy nothing but a `skip` entry, which is a worse lie
# than saying plainly that we do not police dev-only duplicates.
multiple-versions-include-dev = false
# Show every path to a duplicate, so a failure names the dependency that pulled
# the second copy in.
highlight = "all"
# A wildcard version is never intentional. No exceptions: every dependency in
# this workspace, the private test fixture included, states a real requirement.
wildcards = "deny"
allow = []
deny = []

[sources]
# Everything comes from crates.io. A git or path dependency reaching a published
# crate is either a mistake or a supply-chain risk, and "warn" in CI is
# indistinguishable from "ignored".
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
