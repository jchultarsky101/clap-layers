name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # A new advisory lands against an unchanged Cargo.lock, so a check that only
    # runs on push will not see it. Weekly, Mondays 07:00 UTC.
    #
    # GitHub disables scheduled workflows after 60 days without repository
    # activity, so treat a long silence here as "unverified", not "clean".
    - cron: "0 7 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-deny
      # Runs advisories, licenses, bans and sources, per deny.toml. The same
      # command developers run locally, so a failure here reproduces verbatim.
      - name: cargo deny check
        run: cargo deny check

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-audit
      # Deliberately overlaps cargo-deny's `advisories` check: this is the
      # canonical RustSec tool and fetches the database independently, so it
      # fails if that check is ever misconfigured into passing vacuously. If the
      # duplication stops earning its keep, drop this job — `cargo deny check`
      # covers it.
      - name: cargo audit
        run: cargo audit
